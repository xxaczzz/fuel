<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>FUEL — Smart Nutrition Journal</title>
  <meta name="description" content="Personal nutrition tracker. Photo recognition, calorie & macro tracking, smart meal plans, and auto-adjusting targets based on your real progress.">

  <!-- Theme & PWA -->
  <meta name="theme-color" content="#0a0a0a">
  <meta name="color-scheme" content="dark">
  <link rel="manifest" href="/manifest.json">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FUEL">
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/assets/icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/assets/icons/icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/icon-32.png">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="FUEL — Smart Nutrition Journal">
  <meta property="og:description" content="Photo-based food tracking, smart meal plans, and auto-adjusting calorie targets.">
  <meta property="og:image" content="/assets/og-image.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="FUEL — Smart Nutrition Journal">
  <meta name="twitter:description" content="Photo-based food tracking, smart meal plans, and auto-adjusting calorie targets.">
  <meta name="twitter:image" content="/assets/og-image.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;500;700&family=Inter+Tight:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<!-- Update banner (shown only when new SW version is ready) -->
<div id="update-banner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:#d4ff3a;color:#0a0a0a;padding:calc(12px + env(safe-area-inset-top, 0px)) calc(16px + env(safe-area-inset-right, 0px)) 12px calc(16px + env(safe-area-inset-left, 0px));display:none;align-items:center;justify-content:space-between;gap:12px;font-family:-apple-system,BlinkMacSystemFont,'Inter Tight',sans-serif;font-weight:600;font-size:14px;box-shadow:0 2px 12px rgba(0,0,0,0.4);">
  <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
    <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">New version available</span>
  </div>
  <button id="update-banner-btn" style="background:#0a0a0a;color:#d4ff3a;border:none;padding:8px 16px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;letter-spacing:0.05em;flex-shrink:0;">UPDATE</button>
  <button id="update-banner-close" aria-label="Dismiss" style="background:transparent;border:none;color:#0a0a0a;cursor:pointer;padding:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
  </button>
</div>

<div id="app">
  <div id="screen"></div>
  <nav class="nav hidden" id="nav">
    <button class="nav-btn active" data-tab="today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12l9-9 9 9v10a2 2 0 01-2 2h-5v-7h-4v7H5a2 2 0 01-2-2V12z"/></svg>
      Today
    </button>
    <button class="nav-btn" data-tab="log">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2v6m0 0L9 5m3 3l3-3M5 8h14l-1 13H6L5 8z"/></svg>
      Log
    </button>
    <button class="nav-btn" data-tab="plan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      Plan
    </button>
    <button class="nav-btn" data-tab="body">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="6" r="3"/><path d="M5 21v-2a4 4 0 014-4h6a4 4 0 014 4v2"/></svg>
      Body
    </button>
    <button class="nav-btn" data-tab="stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 20V10M9 20V4M15 20v-7M21 20V8"/></svg>
      Progress
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<div class="modal-backdrop" id="modal">
  <div class="modal" id="modal-content"></div>
</div>

<script src="/js/foods.js"></script>
<script src="/js/recipes.js"></script>
<script src="/js/app.js"></script>
<script>
  // PWA Service Worker registration with manual update prompt
  if ('serviceWorker' in navigator) {
    const banner = document.getElementById('update-banner');
    const updateBtn = document.getElementById('update-banner-btn');
    const closeBtn = document.getElementById('update-banner-close');
    let waitingWorker = null;
    let dismissedUntil = 0;

    function showUpdateBanner(worker) {
      waitingWorker = worker;
      if (Date.now() < dismissedUntil) return;
      banner.style.display = 'flex';
    }

    function hideUpdateBanner() {
      banner.style.display = 'none';
    }

    updateBtn.addEventListener('click', () => {
      if (!waitingWorker) {
        window.location.reload();
        return;
      }
      waitingWorker.postMessage({ type: 'SKIP_WAITING' });
    });

    closeBtn.addEventListener('click', () => {
      hideUpdateBanner();
      dismissedUntil = Date.now() + 5 * 60 * 1000;
    });

    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => {
          console.log('[FUEL] SW registered:', reg.scope);
          reg.update();
          if (reg.waiting && navigator.serviceWorker.controller) {
            showUpdateBanner(reg.waiting);
          }
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            if (!newWorker) return;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                console.log('[FUEL] New version installed, ready to update');
                showUpdateBanner(newWorker);
              }
            });
          });
        })
        .catch(err => console.warn('[FUEL] SW registration failed:', err));

      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        console.log('[FUEL] Controller changed, reloading');
        window.location.reload();
      });

      setInterval(() => {
        navigator.serviceWorker.getRegistration().then(reg => {
          if (reg) reg.update();
        });
      }, 60000);

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          navigator.serviceWorker.getRegistration().then(reg => {
            if (reg) reg.update();
          });
        }
      });
    });
  }
</script>
</body>
</html>
